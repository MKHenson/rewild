services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: rewild
      POSTGRES_USER: rewild
      POSTGRES_PASSWORD: rewild
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rewild
      MINIO_ROOT_PASSWORD: rewild
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
